name: Update Changhua Housing Data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and extract SEGIS CSV
        run: python3 scripts/fetch-segis-csv.py

      - name: Install R system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libuv1-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          Rscript -e 'options(repos = c(RSPM = "https://packagemanager.posit.co/cran/__linux__/noble/latest")); install.packages(c("rmarkdown", "readr", "dplyr", "ggplot2", "plotly", "jsonlite", "tidyr", "networkD3"))'

      - name: Generate R Report
        run: Rscript scripts/render_report.R

      - name: Commit updated data and report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update SEGIS housing data and R report
          file_pattern: data/**/*.csv data/**/*.json report.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
